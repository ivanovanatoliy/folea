name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck:parity
      - run: npm run lint
      - run: npm run lint:type-aware
      - run: npm run format
      - run: npm run test:coverage
      - run: npm audit --audit-level=high

  e2e:
    name: E2E ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare Electron binary
        run: node -e "console.log(require('electron'))"
      - run: npm run build
      - if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e:run
      - if: runner.os != 'Linux'
        run: npm run test:e2e:run
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-results-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  build:
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - if: runner.os == 'Windows'
        name: Smoke test Windows installer
        run: node scripts/smoke-installed-windows.mjs
