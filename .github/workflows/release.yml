name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the v prefix (for example, 1.2.0)
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Authorize release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ACTOR: ${{ github.triggering_actor }}
        run: |
          if ! permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${RELEASE_ACTOR}/permission" --jq '.permission' 2>/dev/null)"; then
            echo "::error::Unable to verify release permission for ${RELEASE_ACTOR}."
            exit 1
          fi

          if [[ "$permission" != "admin" && "$permission" != "maintain" ]]; then
            echo "::error::Releases require admin or maintain permission. ${RELEASE_ACTOR} has ${permission} permission."
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: release
        name: Validate release
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Releases must be run from the main branch."
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Version must be valid SemVer without the v prefix."
            exit 1
          fi

          tag="v${RELEASE_VERSION}"
          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  test:
    name: Test release
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build ${{ matrix.artifact-name }}
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: folea-linux-x64
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
          - os: windows-latest
            artifact-name: folea-windows-x64
            artifact-path: dist/*.exe
          - os: macos-15-intel
            artifact-name: folea-macos-x64
            artifact-path: |
              dist/*.dmg
              dist/*.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
      - name: Build packages
        run: npm run package -- --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: folea-*
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "$RELEASE_TAG"
            release-assets/*
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$RELEASE_TAG"
            --generate-notes
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
