name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the v prefix (for example, 1.2.0)
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      timestamp: ${{ steps.release.outputs.timestamp }}
      commit_count: ${{ steps.release.outputs.commit_count }}
    steps:
      - name: Authorize release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ACTOR: ${{ github.triggering_actor }}
        run: |
          if ! permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${RELEASE_ACTOR}/permission" --jq '.permission' 2>/dev/null)"; then
            echo "::error::Unable to verify release permission for ${RELEASE_ACTOR}."
            exit 1
          fi

          if [[ "$permission" != "admin" && "$permission" != "maintain" ]]; then
            echo "::error::Releases require admin or maintain permission. ${RELEASE_ACTOR} has ${permission} permission."
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - id: release
        name: Validate release
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Releases must be run from the main branch."
            exit 1
          fi

          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "::error::Checkout does not match the selected main commit."
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Version must be valid SemVer without the v prefix."
            exit 1
          fi

          tag="v${RELEASE_VERSION}"
          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "commit_count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

  test:
    name: Test release
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build ${{ matrix.artifact-name }}
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact-name: folea-linux-x64
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
          - os: windows-latest
            arch: x64
            artifact-name: folea-windows-x64
            artifact-path: dist/*.exe
          - os: macos-15-intel
            arch: x64
            artifact-name: folea-macos-x64
            artifact-path: dist/*.dmg
          - os: macos-latest
            arch: arm64
            artifact-name: folea-macos-arm64
            artifact-path: dist/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Set release version and build identity
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          RELEASE_TIMESTAMP: ${{ needs.prepare.outputs.timestamp }}
          RELEASE_COMMIT_COUNT: ${{ needs.prepare.outputs.commit_count }}
          RELEASE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
          cat > packaging/build-info <<EOF
          SOURCE_COMMIT=${RELEASE_SHA}
          SOURCE_COMMIT_SHORT=${RELEASE_SHA:0:7}
          SOURCE_BRANCH=main
          BUILD_TIMESTAMP_UTC=${RELEASE_TIMESTAMP}
          GIT_COMMIT_COUNT=${RELEASE_COMMIT_COUNT}
          WORKFLOW_RUN_URL=${RELEASE_RUN_URL}
          NODE_VERSION=$(node --version)
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron")
          RELEASE_VERSION=${RELEASE_VERSION}
          EOF
      - name: Build packages
        shell: bash
        run: |
          args=(--${{ matrix.arch }})
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            args+=(
              '--config.linux.artifactName=folea-${version}-linux-${arch}.${ext}'
              '--config.deb.packageName=folea'
              '--config.deb.artifactName=folea_${version}_${arch}.${ext}'
            )
          fi
          npm run package -- "${args[@]}"
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - if: runner.os == 'Windows'
        name: Smoke test Windows installer
        run: node scripts/smoke-installed-windows.mjs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: folea-*
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(
            "$RELEASE_TAG"
            release-assets/*
            --repo "$GITHUB_REPOSITORY"
            --target "$RELEASE_SHA"
            --title "$RELEASE_TAG"
            --generate-notes
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
